<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when polyfills try to overwrite window.fetch in environments where it's read-only.
      (function() {
        function makeWritable(obj, prop) {
          if (!obj) return;
          try {
            var val = obj[prop];
            Object.defineProperty(obj, prop, {
              get: function() { return val; },
              set: function(v) { val = v; },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            try {
              Object.defineProperty(obj, prop, {
                value: obj[prop],
                writable: true,
                configurable: true,
                enumerable: true
              });
            } catch (ex) {}
          }
        }
        makeWritable(window, 'fetch');
        if (typeof globalThis !== 'undefined') makeWritable(globalThis, 'fetch');
        if (typeof self !== 'undefined') makeWritable(self, 'fetch');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
